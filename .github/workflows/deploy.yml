name: Deploy till GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Konfigurera Pages
        uses: actions/configure-pages@v5

      - name: Ladda upp hela repot som sida
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy till GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
