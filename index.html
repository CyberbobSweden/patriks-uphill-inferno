<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">

<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden; background: #1a2a1a;
    font-family: 'Segoe UI', Arial, sans-serif; touch-action: none;
  }
  #game { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 10px; left: 10px; color: #fff;
    text-shadow: 0 0 4px #000, 0 0 4px #000; font-size: 18px; z-index: 5;
  }
  #gameTitle {
    position: fixed; top: 10px; right: 14px; color: #ffb703; font-size: 20px;
    font-weight: bold; text-shadow: 0 0 6px #000, 0 0 10px #c1121f;
    z-index: 5; letter-spacing: 1px;
  }
  #versionInfo {
    position: fixed; top: 34px; right: 14px; color: #ddd; font-size: 12px;
    text-shadow: 0 0 4px #000; z-index: 5; text-align: right;
  }
  #staminaWrap {
    position: fixed; top: 40px; left: 10px; width: 220px; height: 18px;
    background: rgba(0,0,0,0.4); border: 2px solid #222; border-radius: 4px;
    overflow: hidden; z-index: 5;
  }
  #staminaBar {
    height: 100%; width: 100%; background: #4caf50;
    transition: width 0.1s linear, background-color 0.2s linear;
  }
  #staminaLabel {
    position: fixed; top: 40px; left: 240px; color: #fff; font-size: 13px;
    text-shadow: 0 0 4px #000; z-index: 5; line-height: 18px;
  }
  #msg {
    position: fixed; top: 45%; left: 50%; transform: translate(-50%,-50%);
    color: #fff; font-size: 28px; text-shadow: 0 0 6px #000; z-index: 10;
    text-align: center; display: none;
  }
  #controls {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    color: #ddd; font-size: 13px; text-shadow: 0 0 4px #000; z-index: 5; text-align:center;
  }
  #musicToggle {
    position: fixed; bottom: 10px; right: 14px; z-index: 6;
    background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #666;
    border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer;
  }

  /* ---------- Start screen ---------- */
  #startScreen {
    position: fixed; inset: 0; z-index: 20;
    background: radial-gradient(ellipse at center, #2b1a0f 0%, #0d0704 100%);
    color: #fff; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; font-family: 'Segoe UI', Arial, sans-serif;
  }
  #startScreen h1 {
    font-size: 42px; color: #ffb703; margin: 0 0 4px 0;
    text-shadow: 0 0 10px #c1121f, 0 0 22px #c1121f;
    letter-spacing: 1px;
  }
  #startScreen .subtitle { color: #bbb; margin-bottom: 28px; font-size: 14px; }
  .startPanel {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 20px 28px; margin-bottom: 22px; min-width: 280px;
  }
  .startPanel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #ffb703; margin: 0 0 14px 0; }
  .settingRow { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin: 10px 0; font-size: 14px; }
  .settingRow input[type="range"] { width: 150px; }
  #startBtn {
    background: linear-gradient(180deg, #ff9500, #c1121f); color: #fff; border: none;
    font-size: 20px; font-weight: bold; padding: 14px 42px; border-radius: 8px;
    cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 14px rgba(193,18,31,0.5);
  }
  #startBtn:hover { filter: brightness(1.1); }
  #startCredits { margin-top: 20px; font-size: 12px; color: #888; }
  #installBtn {
    margin-top: 14px; background: rgba(255,255,255,0.08); color: #ffb703;
    border: 1px solid rgba(255,183,3,0.5); font-size: 13px; padding: 8px 18px;
    border-radius: 6px; cursor: pointer; display: none;
  }
  #installBtn:hover { background: rgba(255,183,3,0.15); }
</style>

<body>

<!-- ---------- Start / settings screen ---------- -->
<div id="startScreen">
  <h1>🔥 PATRIKS UPHILL INFERNO</h1>
  <div class="subtitle">Fysikbaserad uppförsbacke-utmaning</div>

  <div class="startPanel">
    <h2>Ljudinställningar</h2>
    <div class="settingRow">
      <label for="musicToggleStart">Bakgrundsmusik</label>
      <input type="checkbox" id="musicToggleStart" checked>
    </div>
    <div class="settingRow">
      <label for="sfxToggleStart">Ljudeffekter</label>
      <input type="checkbox" id="sfxToggleStart" checked>
    </div>
    <div class="settingRow">
      <label for="musicVolume">Volym</label>
      <input type="range" id="musicVolume" min="0" max="100" value="50">
    </div>
  </div>

  <button id="startBtn">STARTA</button>
  <button id="installBtn">📲 Installera som app</button>
  <div id="startCredits">v<span id="versionStart"></span> · av Cyberbob &amp; Risingbob</div>
</div>

<canvas id="game"></canvas>
<div id="hud">Tid: <span id="time">0.0</span>s</div>
<div id="gameTitle">🔥 PATRIKS UPHILL INFERNO</div>
<div id="versionInfo"></div>
<div id="staminaWrap"><div id="staminaBar"></div></div>
<div id="staminaLabel">Ork: <span id="staminaPct">100</span>%</div>
<div id="msg"></div>
<div id="controls">← Broms / Baklänges &nbsp;|&nbsp; → Gasa &nbsp;|&nbsp; ↑ Luta bakåt (wheelie) &nbsp;|&nbsp; ↓ Luta framåt &nbsp;|&nbsp; SHIFT Stå upp (mer kraft, mer ork) &nbsp;|&nbsp; R Starta om</div>
<button id="musicToggle">🔊 Musik</button>
<button id="sfxToggle" style="position:fixed;bottom:10px;right:100px;z-index:6;background:rgba(0,0,0,0.5);color:#fff;border:1px solid #666;border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;">💥 SFX</button>

<audio id="bgMusic" src="assets/audio/bgmusic.mp3" loop preload="auto"></audio>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
window.addEventListener('resize', resize); resize();

// ---------- Version / Credits ----------
// Höj VERSION varje gång ni gör en ändring så syns det i spelet att det är
// en ny build. Lägg en rad i CHANGELOG.md också (senaste först).
const VERSION = '1.4.1';
const CREDITS = 'Cyberbob & Risingbob';
const CHANGELOG = [
  '1.4.1 – Visuell uppfräschning: bakgrunden var suddig (uppskalad lågupplöst ' +
    'bild) och visade tydliga skarvar var 700:e pixel — nu uppskalad/skärpt ' +
    'offline + spegelvänd varannan gång så skarvarna inte syns lika lätt. ' +
    'Marken visade tidigare ett uppenbart upprepat rutmönster — ersatt med ' +
    'en gradient-fylld jordyta + grästextur-kant + glest utspridda, ' +
    'oregelbundet placerade detaljer istället för ett tydligt rutnät',
  '1.4.0 – PWA: går att installera som app (mobil/dator), helskärm vid start. ' +
    'Fix: fel sprite användes som terräng-tile (syntes som upprepade cyklister). ' +
    'Fix: fysik/krasch-känslighet vid höjdskillnader/hopp (mjukare ramper, vinkel ' +
    'beräknas från faktiska hjulkontakter, krasch kräver att felet håller i sig)',
  '1.3.0 – Ljudeffekter (syntade, 8-bit-stil): hopp, landning, krasch, låg ork-varning + SFX-knapp/inställning',
  '1.2.0 – Startskärm med ljudinställningar, bakgrundsmusik (loop), musik-knapp i spelet',
  '1.1.0 – Ork-system: dränering i uppförsbacke, SHIFT-boost, bonk-effekt',
  '1.0.0 – Första spelbara versionen: fysik, terräng, krasch'
];
document.getElementById('versionInfo').innerHTML = `v${VERSION} &middot; by ${CREDITS}`;
document.getElementById('versionStart').textContent = VERSION;
console.log(`Patriks Uphill Inferno v${VERSION}\n` + CHANGELOG.join('\n'));

// ---------- PWA: service worker + installera-som-app ----------
if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  installBtn.style.display = 'inline-block';
});
installBtn.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  installBtn.style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
});

// ---------- SFX engine (Web Audio API, syntetiska 8-bit-ljud, inga extra filer) ----------
let audioCtx = null;
let sfxOn = true;
const sfxToggleStart = document.getElementById('sfxToggleStart');
const sfxToggleBtn = document.getElementById('sfxToggle');

function ensureAudioCtx(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function sfxVol(){ return (musicVolume.value / 100); }

function playTone(freq, duration, type, vol, glideTo){
  if (!sfxOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (glideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(20,glideTo), t0+duration);
  gain.gain.setValueAtTime(vol*sfxVol(), t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0+duration);
}

function playNoiseBurst(duration, vol){
  if (!sfxOn || !audioCtx) return;
  const bufferSize = Math.floor(audioCtx.sampleRate * duration);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i=0; i<bufferSize; i++){
    data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol*sfxVol(), audioCtx.currentTime);
  noise.connect(gain).connect(audioCtx.destination);
  noise.start();
}

function sfxJump(){ playTone(300, 0.16, 'square', 0.28, 760); }
function sfxLand(){ playTone(160, 0.12, 'triangle', 0.3, 55); }
function sfxCrash(){
  playNoiseBurst(0.4, 0.5);
  playTone(180, 0.4, 'sawtooth', 0.32, 40);
}
function sfxLowStamina(){
  playTone(880, 0.09, 'square', 0.18, null);
  setTimeout(() => playTone(880, 0.09, 'square', 0.18, null), 130);
}
function sfxBonkOut(){ playTone(220, 0.3, 'square', 0.25, 90); }

function applySfxSettings(){
  sfxOn = sfxToggleStart.checked;
  localStorage.setItem('pui_sfxOn', sfxOn);
  sfxToggleBtn.textContent = sfxOn ? '💥 SFX' : '🔇 SFX';
}
sfxToggleStart.addEventListener('change', applySfxSettings);
sfxToggleBtn.addEventListener('click', () => {
  sfxToggleStart.checked = !sfxToggleStart.checked;
  applySfxSettings();
});

// ---------- Audio ----------
const bgMusic = document.getElementById('bgMusic');
const musicToggleStart = document.getElementById('musicToggleStart');
const musicVolume = document.getElementById('musicVolume');
const musicToggle = document.getElementById('musicToggle');

// Läs sparade inställningar (om spelaren varit här förut)
const savedVol = localStorage.getItem('pui_volume');
const savedMusicOn = localStorage.getItem('pui_musicOn');
const savedSfxOn = localStorage.getItem('pui_sfxOn');
if (savedVol !== null) musicVolume.value = savedVol;
if (savedMusicOn !== null) musicToggleStart.checked = savedMusicOn === 'true';
if (savedSfxOn !== null) sfxToggleStart.checked = savedSfxOn === 'true';
bgMusic.volume = musicVolume.value / 100;

function applyMusicSettings(){
  bgMusic.volume = musicVolume.value / 100;
  localStorage.setItem('pui_volume', musicVolume.value);
  localStorage.setItem('pui_musicOn', musicToggleStart.checked);
  musicToggle.textContent = musicToggleStart.checked ? '🔊 Musik' : '🔇 Musik';
  if (musicToggleStart.checked){
    bgMusic.play().catch(()=>{});
  } else {
    bgMusic.pause();
  }
}
musicVolume.addEventListener('input', applyMusicSettings);
musicToggleStart.addEventListener('change', applyMusicSettings);
musicToggle.addEventListener('click', () => {
  musicToggleStart.checked = !musicToggleStart.checked;
  applyMusicSettings();
});

// ---------- Start screen -> game ----------
document.getElementById('startBtn').addEventListener('click', () => {
  ensureAudioCtx();
  applyMusicSettings();
  applySfxSettings();
  // Försök gå helskärm för en bättre app-känsla (misslyckas tyst om
  // webbläsaren blockerar det, t.ex. redan installerad som PWA)
  const el = document.documentElement;
  const reqFS = el.requestFullscreen || el.webkitRequestFullscreen;
  if (reqFS) { try { reqFS.call(el); } catch(e) {} }
  document.getElementById('startScreen').style.display = 'none';
  lastT = performance.now();
});

// ---------- Load assets ----------
const bikeImg = new Image(); bikeImg.src = 'assets/bike_idle.png';
const crashImg = new Image(); crashImg.src = 'assets/crash1.png';
const bgImg = new Image(); bgImg.src = 'assets/bg_day.png';
const tileImg = new Image(); tileImg.src = 'assets/terrain_tile.png';

// ---------- Terrain ----------
const TRACK_LENGTH = 8000;
function groundY(x){
  if (x < 300) return 500;
  let y = 500;
  y -= Math.sin(x*0.0025) * 60;
  y -= Math.sin(x*0.0009 + 1.3) * 120;
  y -= Math.sin(x*0.006 + 2.0) * 25;
  const rampCenters = [1800, 3600, 5400, 7000];
  for (const c of rampCenters){
    const d = x - c;
    const halfWidth = 160;
    if (d > -halfWidth && d < halfWidth){
      // Mjuk rundad kulle (cosinus) istället för spetsig triangel -
      // spetsiga toppar gav omöjliga vinkeländringar och krascher
      y -= (Math.cos((d/halfWidth) * Math.PI) + 1) * 0.5 * 130;
    }
  }
  return y;
}
function groundSlope(x){
  const h = 4;
  return (groundY(x+h) - groundY(x-h)) / (2*h);
}

// ---------- Bike physics state ----------
const WHEEL_BASE = 46;
let state = {};
function resetState(){
  state = {
    x: 150, y: groundY(150) - 40,
    vx: 0, vy: 0,
    angle: 0, angVel: 0,
    onGround: true,
    crashed: false,
    time: 0,
    running: true,
    stamina: 100,
    standing: false,
    lowStaminaWarned: false,
    bonkedOut: false,
    crashTimer: 0
  };
  document.getElementById('msg').style.display = 'none';
}
resetState();

// ---------- Input ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyR') resetState();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ---------- Camera ----------
let camX = 0;

// ---------- Main loop ----------
let lastT = performance.now();
function loop(now){
  const dt = Math.min((now - lastT)/1000, 1/30);
  lastT = now;
  const startVisible = document.getElementById('startScreen').style.display !== 'none';
  if (!startVisible && state.running) update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt){
  if (!state.crashed) state.time += dt;

  const GRAVITY = 1400;
  const ACCEL = 900;
  const BRAKE = 700;
  const MAX_SPEED = 620;
  const AIR_ROTATE_SPEED = 3.4;

  // ---- Stamina tuning ----
  const STAMINA_DRAIN_BASE = 5;
  const STAMINA_DRAIN_SLOPE = 30;
  const STAMINA_REGEN_BASE = 12;
  const STAMINA_REGEN_DOWNHILL = 22;
  const STANDING_POWER_MULT = 1.4;
  const STANDING_DRAIN_MULT = 2.3;
  const STANDING_MIN_STAMINA = 12;

  if (state.crashed){
    state.vx *= 0.9;
    state.angVel *= 0.9;
    state.vy += GRAVITY*dt;
    state.y += state.vy*dt;
    const gy = groundY(state.x);
    if (state.y > gy - 20){ state.y = gy - 20; state.vy = 0; }
    return;
  }

  const currentSlope = groundSlope(state.x);
  const climbSteepness = Math.max(0, -currentSlope);

  const wantsStand = (keys['ShiftLeft'] || keys['ShiftRight']) && state.stamina > STANDING_MIN_STAMINA;
  state.standing = wantsStand && keys['ArrowRight'];

  if (keys['ArrowRight']) {
    const powerMult = Math.max(0.35, Math.min(1, state.stamina / 35));
    const standMult = state.standing ? STANDING_POWER_MULT : 1;
    state.vx += ACCEL * powerMult * standMult * dt;

    if (state.onGround){
      const drain = STAMINA_DRAIN_BASE * (1 + climbSteepness * STAMINA_DRAIN_SLOPE)
                    * (state.standing ? STANDING_DRAIN_MULT : 1);
      state.stamina = Math.max(0, state.stamina - drain*dt);
    }
  } else if (keys['ArrowLeft']) {
    state.vx -= BRAKE*dt;
    if (state.onGround){
      state.stamina = Math.min(100, state.stamina + STAMINA_REGEN_BASE*0.4*dt);
    }
  } else {
    state.vx *= (state.onGround ? 0.985 : 0.999);
    if (state.onGround){
      const downhillBonus = Math.max(0, currentSlope) * STAMINA_REGEN_DOWNHILL;
      state.stamina = Math.min(100, state.stamina + (STAMINA_REGEN_BASE + downhillBonus)*dt);
    }
  }
  state.vx = Math.max(-MAX_SPEED*0.5, Math.min(MAX_SPEED, state.vx));

  state.vy += GRAVITY*dt;

  if (!state.onGround){
    if (keys['ArrowUp']) state.angVel -= AIR_ROTATE_SPEED*dt*10;
    if (keys['ArrowDown']) state.angVel += AIR_ROTATE_SPEED*dt*10;
    state.angVel *= 0.99;
  }

  state.x += state.vx*dt;
  state.y += state.vy*dt;
  state.angle += state.angVel*dt;

  state.x = Math.max(60, Math.min(TRACK_LENGTH-60, state.x));

  const fx = state.x + Math.cos(state.angle)*WHEEL_BASE;
  const fy_ = state.y + Math.sin(state.angle)*WHEEL_BASE;
  const rx = state.x - Math.cos(state.angle)*WHEEL_BASE;
  const ry_ = state.y - Math.sin(state.angle)*WHEEL_BASE;

  const groundF = groundY(fx) - 18;
  const groundR = groundY(rx) - 18;

  const frontBelow = fy_ >= groundF;
  const rearBelow = ry_ >= groundR;

  const wasOnGround = state.onGround;

  if (frontBelow || rearBelow){
    state.onGround = true;

    // Vinkel baserad på faktiska hjulkontakter (mjukare & stabilare än en
    // momentan derivata mitt under cykeln, som kunde ge orimliga hopp i
    // brant/kuperad terräng)
    const groundFront = groundY(fx);
    const groundRear = groundY(rx);
    const targetAngle = Math.atan2(groundFront - groundRear, fx - rx);
    const groundC = (groundFront + groundRear) / 2 - 20;

    const penetration = state.y - groundC;
    if (penetration > 0){
      state.vy -= penetration * 40;
      state.vy *= 0.5;
      state.y = groundC;
    }

    const angDiff = targetAngle - state.angle;
    state.angVel += angDiff * 18 * dt * 60 * dt;
    state.angle += angDiff * Math.min(1, 12*dt);
    state.angVel *= 0.7;

    // Krascha bara om felvinkeln är stor OCH håller i sig en liten stund -
    // en enstaka frame med stort fel (t.ex. vid en kulltopp) ska inte
    // räcka, det ska kännas orättvist snabbt annars
    if (Math.abs(angDiff) > 1.4 && state.vx > 150){
      state.crashTimer += dt;
      if (state.crashTimer > 0.12) crash();
    } else {
      state.crashTimer = Math.max(0, state.crashTimer - dt*2);
    }
  } else {
    state.onGround = false;
    state.crashTimer = Math.max(0, state.crashTimer - dt*2);
  }

  if (!wasOnGround && state.onGround && !state.crashed){
    sfxLand();
  } else if (wasOnGround && !state.onGround && state.vy < -140){
    sfxJump();
  }

  // Ork-varning: pip en gång när den sjunker under 20%, återställ över 30%
  if (state.stamina < 20 && !state.lowStaminaWarned){
    sfxLowStamina();
    state.lowStaminaWarned = true;
  } else if (state.stamina > 30){
    state.lowStaminaWarned = false;
  }

  if (state.stamina <= 0 && !state.bonkedOut){
    sfxBonkOut();
    state.bonkedOut = true;
  } else if (state.stamina > 15){
    state.bonkedOut = false;
  }

  const normAngle = ((state.angle + Math.PI) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI) - Math.PI;
  if (Math.abs(normAngle) > 2.2){
    crash();
  }

  if (state.y > 1200){
    crash();
  }

  camX = state.x - innerWidth*0.35;
}

function crash(){
  if (state.crashed) return;
  state.crashed = true;
  sfxCrash();
  const msg = document.getElementById('msg');
  msg.textContent = 'Krasch! Tryck R för att starta om';
  msg.style.display = 'block';
}

// ---------- Rendering ----------
function render(){
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);

  const skyGrad = ctx.createLinearGradient(0,0,0,h);
  skyGrad.addColorStop(0, '#7ec8e3');
  skyGrad.addColorStop(1, '#cfe9d8');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,w,h);

  if (bgImg.complete && bgImg.naturalWidth){
    const bw = 900, bh = bw * (bgImg.naturalHeight/bgImg.naturalWidth);
    const parX = -(camX*0.25);
    const startI = Math.floor((-parX - w) / bw) - 1;
    const endI = Math.ceil((-parX + w*2) / bw) + 1;
    for (let i=startI; i<=endI; i++){
      const xPos = parX + i*bw;
      // Varannan kopia spegelvänd (ping-pong) - döljer den annars tydliga
      // skarven av att samma bild upprepas identiskt om och om igen
      if (i % 2 === 0){
        ctx.drawImage(bgImg, xPos, h*0.22, bw, bh);
      } else {
        ctx.save();
        ctx.translate(xPos + bw, h*0.22);
        ctx.scale(-1, 1);
        ctx.drawImage(bgImg, 0, 0, bw, bh);
        ctx.restore();
      }
    }
  }

  ctx.save();
  ctx.translate(-camX, 0);

  // Marken: gradient-fyllning istället för ett uppenbart upprepat rutmönster
  const startX = Math.max(0, camX-100);
  const endX = camX + w + 100;
  ctx.beginPath();
  ctx.moveTo(startX, h+400);
  for (let x=startX; x<=endX; x+=12){
    ctx.lineTo(x, groundY(x));
  }
  ctx.lineTo(endX, h+400);
  ctx.closePath();
  const dirtGrad = ctx.createLinearGradient(0, groundY(startX)-10, 0, h+400);
  dirtGrad.addColorStop(0, '#8a5a34');
  dirtGrad.addColorStop(0.15, '#6b4a2f');
  dirtGrad.addColorStop(1, '#3d2a1c');
  ctx.fillStyle = dirtGrad;
  ctx.fill();

  // Grästäckt kant längs ytan - tjockare grön linje med lite ojämnhet
  ctx.beginPath();
  ctx.moveTo(startX, groundY(startX));
  for (let x=startX; x<=endX; x+=8){
    ctx.lineTo(x, groundY(x) - 2 + Math.sin(x*0.35)*1.2);
  }
  ctx.strokeStyle = '#3f7a2e';
  ctx.lineWidth = 9;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(startX, groundY(startX));
  for (let x=startX; x<=endX; x+=8) ctx.lineTo(x, groundY(x));
  ctx.strokeStyle = '#2e5c1f';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Glesa dekorativa detaljer (samma tile, men oregelbundet utspridda och
  // varierade i skala/rotation så det inte ser ut som ett rutnät)
  if (tileImg.complete && tileImg.naturalWidth){
    const spacing = 260;
    const firstIdx = Math.floor(startX / spacing);
    const lastIdx = Math.ceil(endX / spacing);
    for (let i=firstIdx; i<=lastIdx; i++){
      const seed = i * 12.9898;
      const rnd = (Math.sin(seed) * 43758.5453) % 1;
      const rnd2 = (Math.sin(seed*1.7+3.1) * 12543.31) % 1;
      const jitter = (Math.abs(rnd) - 0.5) * spacing * 0.7;
      const tx = i*spacing + spacing/2 + jitter;
      const scale = 0.5 + Math.abs(rnd2) * 0.4;
      const tw = tileImg.naturalWidth * scale;
      const th = tileImg.naturalHeight * scale;
      const ty = groundY(tx) - th*0.35;
      ctx.drawImage(tileImg, tx - tw/2, ty, tw, th);
    }
  }

  ctx.save();
  ctx.translate(state.x, state.y);
  if (!state.crashed){
    ctx.rotate(state.angle);
    if (bikeImg.complete) ctx.drawImage(bikeImg, -bikeImg.width/2, -bikeImg.height/2 + 10);
  } else {
    if (crashImg.complete) ctx.drawImage(crashImg, -crashImg.width/2, -crashImg.height/2 + 20);
  }
  ctx.restore();

  ctx.restore();

  document.getElementById('time').textContent = state.time.toFixed(1);

  const pct = Math.round(state.stamina);
  const bar = document.getElementById('staminaBar');
  bar.style.width = pct + '%';
  bar.style.backgroundColor = pct > 55 ? '#4caf50' : (pct > 25 ? '#e0a800' : '#c62828');
  document.getElementById('staminaPct').textContent = pct;
}

requestAnimationFrame(loop);
</script>
</body>
</html>
